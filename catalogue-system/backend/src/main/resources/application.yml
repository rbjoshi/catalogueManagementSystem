spring:
  application:
    name: catalogue-management

  datasource:
    url: jdbc:postgresql://localhost:5432/catalogue_db?options=-c%20timezone=UTC
    username: admin
    password: pwd123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      time-to-live: 3600000  # 1 hour in ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-super-secret-jwt-key-that-should-be-at-least-256-bits-long-for-hs256
  expiration: 86400000       # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
  storage:
    type: local   # local | s3
    local-path: ./uploads
    s3:
      bucket: catalogue-media
      region: ap-south-1
      access-key: your-access-key
      secret-key: your-secret-key

logging:
  level:
    com.catalogue: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
